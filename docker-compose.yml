services:
  mysql:
    image: mysql:8.4.0
    container_name: mysql
    restart: always
    env_file:
      - ./db/.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailserver:
    image: boky/postfix
    container_name: mailserver
    restart: always
    environment:
      - ALLOWED_SENDER_DOMAINS=localhost
    ports:
      - "1025:25"

