services:
  mysql:
    image: mysql:8.4.0
    container_name: mysql
    restart: always
    env_file:
      - ./db/.env
    volumes:
      - mysql_data:/var/lib/mysql
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    command: npm start
    env_file:
      - ./backend/.env
    volumes:
      - /var/www/app/backend/uploads:/app/uploads
    ports:
      - "8888:8888"
    depends_on:
      mysql:
        condition: service_healthy
      mailserver:
        condition: service_started


  nextjs:
    image: ghcr.io/idw-coder/next-basic:latest
    container_name: nextjs
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://backend:8888
    restart: unless-stopped

  mailserver:
    image: boky/postfix
    container_name: mailserver
    restart: always
    environment:
      - ALLOWED_SENDER_DOMAINS=ntorelabo.com
    ports:
      - "1025:25"

volumes:
  mysql_data: